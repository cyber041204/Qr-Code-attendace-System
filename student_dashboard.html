<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal | QR Attendance System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="firebase-init.js?v=5"></script>
    <style>
        .portal-card {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            margin: -60px auto 15px;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            margin: 1.5rem 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #eee;
            margin-top: 10px;
        }
        .info-item label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: #888;
            text-transform: uppercase;
        }
        .info-item span {
            font-weight: 700;
            color: var(--dark);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="flex-center">
    <div style="height: 60px;"></div> <!-- Spacer for profile image overflow -->
    <main class="glass-card portal-card">
        <img id="studentPhoto" class="profile-img" src="https://via.placeholder.com/150" alt="Profile">
        
        <h2 id="studentName" style="margin: 0; color: var(--dark);">Student Name</h2>
        <p style="color: #666; font-size: 14px; margin: 5px 0 20px;">Your Identification QR Code</p>

        <div id="qrcode"></div>

        <div class="info-grid">
            <div class="info-item">
                <label>Course</label>
                <span id="res-course">---</span>
            </div>
            <div class="info-item">
                <label>Year & Section</label>
                <span id="res-year-sec">---</span>
            </div>
            <div class="info-item" style="grid-column: span 2;">
                <label>Today's Attendance</label>
                <span id="res-status" style="font-size: 16px;">NOT SCANNED</span>
            </div>
            <div class="info-item">
                <label>Time In</label>
                <span id="res-timein">--:--</span>
            </div>
            <div class="info-item">
                <label>Time Out</label>
                <span id="res-timeout">--:--</span>
            </div>
        </div>

        <a href="logout.html" class="btn btn-danger" style="margin-top: 25px; padding: 12px; font-size: 14px;">Log Out</a>
    </main>
</div>

<script>
async function loadPortal() {
    const user = JSON.parse(localStorage.getItem("currentUser"));
    if (!user || user.role !== "student") {
        window.location = "index.html";
        return;
    }

    // Load Student Profile
    const students = await FB.get('students');
    let studentData = null;
    for (let key in students) {
        if (students[key].id === user.id) {
            studentData = students[key];
            break;
        }
    }

    if (!studentData) {
        alert("Account not found!");
        window.location = "index.html";
        return;
    }

    // UI Updates
    document.getElementById("studentName").innerText = studentData.name;
    document.getElementById("studentPhoto").src = studentData.photo;
    document.getElementById("res-course").innerText = studentData.course;
    document.getElementById("res-year-sec").innerText = `${studentData.year}yr - Sec ${studentData.section}`;

    // Generate QR
    new QRCode(document.getElementById("qrcode"), {
        text: studentData.id,
        width: 180,
        height: 180,
        colorDark: "#1a1a2e",
        correctLevel: QRCode.CorrectLevel.H
    });

    // Watch Today's Attendance
    const today = getTodayDate();
    FB.watch(`attendance/${today}/${studentData.id}`, (record) => {
        const statusEl = document.getElementById("res-status");
        if (record) {
            statusEl.innerText = record.status;
            statusEl.style.color = record.status === "LATE" ? "var(--danger)" : "var(--success)";
            document.getElementById("res-timein").innerText = record.timeIn;
            document.getElementById("res-timeout").innerText = record.timeOut;
        } else {
            statusEl.innerText = "NOT SCANNED YET";
            statusEl.style.color = "#888";
        }
    });
}

loadPortal();
</script>
</body>
</html>
